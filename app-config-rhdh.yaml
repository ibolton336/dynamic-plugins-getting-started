kind: ConfigMap
apiVersion: v1
metadata:
  name: app-config-rhdh
  labels: 
    # This needs to be set to the value of the 'EXT_CONF_SYNC_backstage' env var in the operator container, which is 'true' if unset
    rhdh.redhat.com/ext-config-sync: "true"
  annotations: 
    rhdh.redhat.com/backstage-name: "developer-hub"
data:
  app-config-rhdh.yaml: |-
    app:
      title: Red Hat Developer Hub - Getting Started
      baseUrl: https://backstage-developer-hub-local-backtage.ibolton-3626522b15eedb880d7b99992e225c1b-0000.us-east.containers.appdomain.cloud

    backend:
      baseUrl: https://backstage-developer-hub-local-backtage.ibolton-3626522b15eedb880d7b99992e225c1b-0000.us-east.containers.appdomain.cloud
      cors:
        origin: https://backstage-developer-hub-local-backtage.ibolton-3626522b15eedb880d7b99992e225c1b-0000.us-east.containers.appdomain.cloud

    mta:
      url: https://tackle-konveyor-tackle.ibolton-3626522b15eedb880d7b99992e225c1b-0000.us-east.containers.appdomain.cloud
      providerAuth:
        realm: tackle 
        secret: backstage-provider-secret
        clientID: backstage-provider

    auth:
      environment: development
      providers:
        guest:
          dangerouslyAllowOutsideDevelopment: true
