kind: ConfigMap
apiVersion: v1
metadata:
  name: dynamic-plugins-rhdh
  labels: 
    # This needs to be set to the value of the 'EXT_CONF_SYNC_backstage' env var in the operator container, which is 'true' if unset
    rhdh.redhat.com/ext-config-sync: "true"
  annotations: 
    rhdh.redhat.com/backstage-name: "developer-hub"

data:
  dynamic-plugins.yaml: |
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      - package: 'http://plugin-registry:8080/internal-backstage-plugin-catalog-backend-module-mta-entity-provider-dynamic-0.1.0.tgz'
        disabled: false
        integrity: 'sha512-m6bf0cy9xWfOdtRnCQqWXBgbEGgPFKatyhxhXI6yhJpaRk2pY08l1ECbw5qGX6h2clztS49URQoNgKuWtu1PFQ=='
      - package: 'http://plugin-registry:8080/internal-backstage-plugin-mta-backend-dynamic-0.1.0.tgz'
        disabled: false
        integrity: 'sha512-bkrOAY++IjbnxF2l0frz2tR5XLaq24RReJ+f/cdoLm5kKZEFbOeGul8T/wACYHDKu5L87J2ghL5Sw2Kq4W0eyA=='